---
- name: Ensure Soft Serve paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ soft_serve_uid }}"
    group: "{{ soft_serve_gid }}"
  with_items:
    - "{{ soft_serve_base_path }}"
    - "{{ soft_serve_data_path }}"

- name: Ensure Soft Serve support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ soft_serve_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ soft_serve_uid }}"
    group: "{{ soft_serve_gid }}"
  with_items:
    - env
  register: soft_serve_support_files_result

- name: Ensure Soft Serve container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ soft_serve_container_image }}"
    pull: always
  register: soft_serve_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: soft_serve_container_image_pull_result_ansible_module is not failed

- name: Ensure Soft Serve container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ soft_serve_container_image }}"
  register: soft_serve_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: soft_serve_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in soft_serve_container_image_pull_result_command.stdout"

- name: Ensure Soft Serve container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ soft_serve_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: soft_serve_network_creation_result

- name: Ensure Soft Serve container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ soft_serve_container_network }}
  register: soft_serve_network_creation_result
  changed_when: soft_serve_network_creation_result.rc == 0
  failed_when: soft_serve_network_creation_result.rc != 0 and 'already exists' not in soft_serve_network_creation_result.stderr

- name: Ensure Soft Serve systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/soft-serve.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ soft_serve_identifier }}.service"
    mode: "0644"
  register: soft_serve_systemd_service_result

- name: Determine whether Soft Serve needs a restart
  ansible.builtin.set_fact:
    soft_serve_restart_necessary: >-
      {{
        soft_serve_support_files_result.changed | default(false)
        or soft_serve_systemd_service_result.changed | default(false)
        or soft_serve_container_image_pull_result_ansible_module.changed | default(false)
        or soft_serve_container_image_pull_result_command.changed | default(false)
      }}
